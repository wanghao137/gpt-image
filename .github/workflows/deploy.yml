name: Deploy GitHub Pages

# GH Pages is kept as a fallback mirror only. The live site is on Vercel
# (auto-deploys on push to main). Daily upstream data sync lives in
# `sync.yml` — running it here too would just re-deploy GH Pages with
# no code or data delta. Triggers are limited to git push and manual
# workflow_dispatch on purpose.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          # Password hash for the hidden /admin entry. Configure as a
          # repository "Variable" (Settings → Secrets and variables → Actions →
          # Variables tab) so it gets injected into the static bundle. The
          # hash itself is safe to expose — it gates a UI that still requires
          # a separate GitHub PAT to actually write anything.
          VITE_ADMIN_PASSWORD_HASH: ${{ vars.VITE_ADMIN_PASSWORD_HASH }}
          VITE_ADMIN_REPO_OWNER: ${{ github.repository_owner }}
          VITE_ADMIN_REPO_NAME: ${{ github.event.repository.name }}
          VITE_ADMIN_REPO_BRANCH: ${{ github.ref_name }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
