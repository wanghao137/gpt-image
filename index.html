<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a09" />
    <meta name="color-scheme" content="dark" />
    <script>
      (function () {
        try {
          var key = "taostudio.theme";
          var mode = window.localStorage.getItem(key);
          if (mode !== "light" && mode !== "dark" && mode !== "system") mode = "system";
          var system = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          var theme = mode === "system" ? system : mode;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", theme === "light" ? "#fffaf2" : "#0c0a09");
          var colorScheme = document.querySelector('meta[name="color-scheme"]');
          if (colorScheme) colorScheme.setAttribute("content", theme);
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>

    <!--
      Default <head> tags. Each page replaces these via `<SEO>` (vite-react-ssg
      injects the SSR'd head atoms into the static HTML at build time, so this
      block here is just the "fallback before JS hydrates" surface area for
      routes the SSG didn't touch — the title is intentionally omitted so
      per-page <SEO> titles win in browsers that read the last title tag.)
    -->
    <meta
      name="description"
      content="桃子AI视觉实验室整理小红书封面、商家海报、人像写真、信息图等 GPT-Image 2 真实案例与 Prompt 模板，按场景分类，一键复制就能出图。"
    />
    <meta name="author" content="桃子AI视觉实验室" />
    <meta name="keywords" content="桃子AI视觉实验室, Tao Studio AI, GPT-Image 2, GPT-Image 提示词, AI 图片提示词, 小红书封面, 商家海报, 人像写真, AI 海报, Prompt 模板" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />

    <!--
      Image delivery: every image is baked into /images/* during the
      `prebuild` script (`scripts/build-images.mjs`), with WebP variants
      at 320/480/640/960 widths plus a canonical 1200 px JPEG fallback.
      All same-origin, no preconnect needed.

      Fonts: Instrument Serif is self-hosted under /fonts/. We dropped the
      previous Google Fonts <link> because fonts.googleapis.com regularly
      blocks for 5-15 seconds on Chinese mobile networks before the browser
      gives up and falls back. With self-hosted woff2 (~15KB each, latin
      subset) the font is loaded from the same Vercel edge as the HTML —
      first paint is instant, and the headlines stop flickering between
      system serif and Instrument Serif.
    -->

    <!--
      Preload the headline font so it arrives during initial connection
      multiplexing rather than blocking the first paint.
      `crossorigin` is required even for same-origin fonts when used with
      preload — browsers fetch fonts in CORS mode by default and a
      mismatch invalidates the preload.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/instrument-serif-regular.woff2"
      crossorigin
    />

    <style>
      /* Self-hosted Instrument Serif. Latin subset only — covers all the
         glyphs we actually render in headlines (the Chinese text uses
         the system serif/sans stack via the .serif-display class fallback
         chain in tailwind.config.cjs). */
      @font-face {
        font-family: "Instrument Serif";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/instrument-serif-regular.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Instrument Serif";
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/instrument-serif-italic.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      /* Critical inline styles to prevent FOUC and reduce CLS */
      html, body, #root { height: 100%; }
      html { background: #0c0a09; }
      body {
        margin: 0;
        background: #0c0a09;
        color: #ece8e1;
        /* System UI stack handles Chinese text natively (PingFang SC on iOS,
           HarmonyOS Sans on Huawei, MS YaHei on Windows). The `.serif-display`
           Tailwind class layers Instrument Serif on top for headline latin
           glyphs only — Chinese chars fall through to the system serif. */
        font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei",
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }

      /* Boot overlay — shown over the SSG'd HTML for the first paint and
         dismissed by an inline script as soon as `window.load` fires (or
         after a 3 s safety net). Renders inline (no JS framework) so it
         appears the moment the HTML parser reaches it.

         Design intent:
           - Full-bleed dark with the same ember radial gradient as the
             site background, so the transition into the home page is a
             pure cross-fade rather than a colour jump.
           - Peach mark + ember-tinted spinner ring + a
             single line of copy. No business about progress bars: the
             actual page is already fully painted underneath, this is
             just a brand handoff for the first 200-400 ms.
           - `pointer-events: none` only after `is-hidden` so we can't
             swallow the user's first click. */
      .boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse 70% 50% at 12% -8%, rgba(217, 119, 87, 0.18), transparent 60%),
          radial-gradient(ellipse 55% 45% at 90% 6%, rgba(217, 119, 87, 0.08), transparent 60%),
          linear-gradient(180deg, #0c0a09 0%, #0a0807 60%, #0e0b0a 100%);
        transition: opacity 380ms ease, visibility 380ms ease;
      }
      .boot-overlay.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-overlay__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 0 24px;
      }
      .boot-overlay__icon {
        width: 48px;
        height: 48px;
        opacity: 0.96;
        animation: bootGlow 1.6s ease-in-out infinite alternate;
      }
      .boot-overlay__spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 2px solid rgba(217, 119, 87, 0.18);
        border-top-color: #d97757;
        animation: bspin 0.9s linear infinite;
      }
      .boot-overlay__text {
        font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei",
          "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: #ece8e1;
        opacity: 0.7;
      }
      @keyframes bspin { to { transform: rotate(360deg); } }
      @keyframes bootGlow {
        from { opacity: 0.55; transform: translateY(0); }
        to   { opacity: 1;    transform: translateY(-2px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-overlay__icon,
        .boot-overlay__spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"><!--app-html--></div>

    <!--
      Boot overlay. Sits on top of the SSG'd page until the document fully
      loads (or 3 s elapse). The inline script fires before main.tsx so it
      doesn't depend on React being parsed. It survives a slow JS cold start
      because the SSG'd HTML beneath is already meaningful — this is purely
      a brand-consistent visual handoff.
    -->
    <div id="boot-overlay" class="boot-overlay" aria-hidden="true">
      <div class="boot-overlay__inner">
        <svg class="boot-overlay__icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="boot-peach" x1="9" y1="10" x2="55" y2="58" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff7569" />
              <stop offset="55%" stop-color="#ff9b48" />
              <stop offset="100%" stop-color="#ea7341" />
            </linearGradient>
            <linearGradient id="boot-leaf" x1="37" y1="20" x2="58" y2="4" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#557f5c" />
              <stop offset="100%" stop-color="#9dcb8b" />
            </linearGradient>
          </defs>
          <path d="M31.8 58.1C18.2 58.1 7.6 48.4 7.6 35.1 7.6 22 17.5 10.8 29.4 10.8c4.8 0 8.4 1.7 10.8 4.8 2.3-2.5 5.5-3.8 9.1-3.1 7.3 1.3 11.7 8.5 11.7 17.2 0 15.5-12.4 28.4-29.2 28.4Z" fill="url(#boot-peach)" />
          <path d="M39.1 18.9C42.9 8.5 50 4.3 58.4 5.3c-.7 8.8-7.7 15.7-18.6 15.9-.9 0-1.2-.5-.7-2.3Z" fill="url(#boot-leaf)" />
        </svg>
        <span class="boot-overlay__spinner"></span>
        <span class="boot-overlay__text">正在加载桃子AI视觉实验室…</span>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("boot-overlay");
        if (!el) return;
        var dismissed = false;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          el.classList.add("is-hidden");
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }, 500);
        }
        if (document.readyState === "complete") {
          // Browser already done — dismiss on the next frame so the user
          // still sees a brief cross-fade rather than a hard pop.
          requestAnimationFrame(dismiss);
        } else {
          window.addEventListener(
            "load",
            function () {
              // Tiny breath after `load` so React's first paint is up.
              setTimeout(dismiss, 80);
            },
            { once: true }
          );
        }
        // Safety net: never block interaction for more than 3 seconds even
        // if `load` never fires (e.g. a single hung image somewhere).
        setTimeout(dismiss, 3000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
