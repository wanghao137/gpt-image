<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a09" />
    <meta name="color-scheme" content="dark" />
    <script>
      (function () {
        try {
          var key = "taostudio.theme";
          var mode = window.localStorage.getItem(key);
          if (mode !== "light" && mode !== "dark" && mode !== "system") mode = "system";
          var system = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          var theme = mode === "system" ? system : mode;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", theme === "light" ? "#fffaf2" : "#0c0a09");
          var colorScheme = document.querySelector('meta[name="color-scheme"]');
          if (colorScheme) colorScheme.setAttribute("content", theme);
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>

    <!--
      Default <head> tags. Each page replaces these via `<SEO>` (vite-react-ssg
      injects the SSR'd head atoms into the static HTML at build time, so this
      block here is just the "fallback before JS hydrates" surface area for
      routes the SSG didn't touch — the title is intentionally omitted so
      per-page <SEO> titles win in browsers that read the last title tag.)
    -->
    <meta
      name="description"
      content="桃子AI视觉实验室整理小红书封面、商家海报、人像写真、信息图等 GPT-Image 2 真实案例与 Prompt 模板，按场景分类，一键复制就能出图。"
    />
    <meta name="author" content="桃子AI视觉实验室" />
    <meta name="keywords" content="桃子AI视觉实验室, GPT-Image 2, GPT-Image 提示词, AI 图片提示词, 小红书封面, 商家海报, 人像写真, AI 海报, Prompt 模板" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=taostudio-peach-raster-20260522" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=taostudio-peach-raster-20260522" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=taostudio-peach-raster-20260522" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=taostudio-peach-raster-20260522" />

    <!--
      Image delivery: every image is baked into /images/* during the
      `prebuild` script (`scripts/build-images.mjs`), with WebP variants
      at 320/480/640/960 widths plus a canonical 1200 px JPEG fallback.
      All same-origin, no preconnect needed.

      Fonts: Instrument Serif is self-hosted under /fonts/. We dropped the
      previous Google Fonts <link> because fonts.googleapis.com regularly
      blocks for 5-15 seconds on Chinese mobile networks before the browser
      gives up and falls back. With self-hosted woff2 (~15KB each, latin
      subset) the font is loaded from the same Vercel edge as the HTML —
      first paint is instant, and the headlines stop flickering between
      system serif and Instrument Serif.
    -->

    <!--
      Preload the headline font so it arrives during initial connection
      multiplexing rather than blocking the first paint.
      `crossorigin` is required even for same-origin fonts when used with
      preload — browsers fetch fonts in CORS mode by default and a
      mismatch invalidates the preload.
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/instrument-serif-regular.woff2"
      crossorigin
    />

    <style>
      /* Self-hosted Instrument Serif. Latin subset only — covers all the
         glyphs we actually render in headlines (the Chinese text uses
         the system serif/sans stack via the .serif-display class fallback
         chain in tailwind.config.cjs). */
      @font-face {
        font-family: "Instrument Serif";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/instrument-serif-regular.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Instrument Serif";
        font-style: italic;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/instrument-serif-italic.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      /* Critical inline styles to prevent FOUC and reduce CLS */
      html, body, #root { height: 100%; }
      html { background: #0c0a09; }
      body {
        margin: 0;
        background: #0c0a09;
        color: #ece8e1;
        /* System UI stack handles Chinese text natively (PingFang SC on iOS,
           HarmonyOS Sans on Huawei, MS YaHei on Windows). The `.serif-display`
           Tailwind class layers Instrument Serif on top for headline latin
           glyphs only — Chinese chars fall through to the system serif. */
        font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei",
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }

    </style>
  </head>
  <body>
    <div id="root"><!--app-html--></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
