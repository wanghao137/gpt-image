<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a09" />
    <meta name="color-scheme" content="dark" />

    <!--
      Default <head> tags. Each page replaces these via `<SEO>` (vite-react-ssg
      injects the SSR'd head atoms into the static HTML at build time, so this
      block here is just the "fallback before JS hydrates" surface area for
      routes the SSG didn't touch — the title is intentionally omitted so
      per-page <SEO> titles win in browsers that read the last title tag.)
    -->
    <meta
      name="description"
      content="小红书封面、商家海报、人像写真、信息图——435+ 个 GPT-Image 2 真实案例，按场景分类，中英双语 Prompt，一键复制就能出图。"
    />
    <meta name="author" content="GPT-Image 2 中文案例库" />
    <meta name="keywords" content="GPT-Image 2, GPT-Image 提示词, AI 图片提示词, 小红书封面, 商家海报, 人像写真, AI 海报, 提示词案例" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://wsrv.nl" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <link rel="preload" as="fetch" href="/data/cases.json" />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <style>
      /* Critical inline styles to prevent FOUC and reduce CLS */
      html, body, #root { height: 100%; }
      html { background: #0c0a09; }
      body {
        margin: 0;
        background: #0c0a09;
        color: #ece8e1;
        font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      .boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: #0c0a09; color: #d97757;
        font-family: "Instrument Serif", Palatino, Georgia, serif;
        font-size: 22px; letter-spacing: -0.01em;
      }
      .boot::after {
        content: ""; width: 38px; height: 38px; margin-left: 14px;
        border-radius: 50%;
        border: 2px solid rgba(217,119,87,0.18);
        border-top-color: #d97757;
        animation: bspin 1s linear infinite;
      }
      @keyframes bspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
