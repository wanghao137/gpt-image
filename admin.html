    <title>桃子AI视觉实验室 · 管理后台</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <style>
      html, body, #admin-root { height: 100%; }
      html { background: #0a0807; }
      body {
        margin: 0;
        background:
          radial-gradient(ellipse 60% 45% at 8% -6%, rgba(217, 119, 87, 0.16), transparent 60%),
          radial-gradient(ellipse 50% 40% at 96% 10%, rgba(217, 119, 87, 0.07), transparent 60%),
          linear-gradient(180deg, #0a0807 0%, #0c0a09 60%, #0e0b0a 100%);
        color: #ece8e1;
        font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      .boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; gap: 14px;
        color: #ece8e1;
        font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
      }
      .boot::after {
        content: ""; width: 32px; height: 32px; margin-left: 12px;
        border-radius: 50%;
        border: 2px solid rgba(217,119,87,0.18);
        border-top-color: #d97757;
        animation: bspin 1s linear infinite;
      }
      .boot svg { width: 42px; height: 42px; }
      @keyframes bspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="admin-root">
      <div class="boot">
        <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="admin-boot-peach" x1="9" y1="10" x2="55" y2="58" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff7569" />
              <stop offset="55%" stop-color="#ff9b48" />
              <stop offset="100%" stop-color="#ea7341" />
            </linearGradient>
            <linearGradient id="admin-boot-leaf" x1="37" y1="20" x2="58" y2="4" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#557f5c" />
              <stop offset="100%" stop-color="#9dcb8b" />
            </linearGradient>
          </defs>
          <path d="M31.8 58.1C18.2 58.1 7.6 48.4 7.6 35.1 7.6 22 17.5 10.8 29.4 10.8c4.8 0 8.4 1.7 10.8 4.8 2.3-2.5 5.5-3.8 9.1-3.1 7.3 1.3 11.7 8.5 11.7 17.2 0 15.5-12.4 28.4-29.2 28.4Z" fill="url(#admin-boot-peach)" />
          <path d="M39.1 18.9C42.9 8.5 50 4.3 58.4 5.3c-.7 8.8-7.7 15.7-18.6 15.9-.9 0-1.2-.5-.7-2.3Z" fill="url(#admin-boot-leaf)" />
        </svg>
        <span>桃子AI视觉实验室管理后台</span>
      </div>
    </div>
    <script type="module" src="/src/admin/main.tsx"></script>
  </body>
</html>
