<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a09" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="referrer" content="no-referrer" />

    <title>桃子AI视觉实验室 · 管理后台</title>
    <script>
      (function () {
        try {
          var key = "taostudio.theme";
          var mode = window.localStorage.getItem(key);
          if (mode !== "light" && mode !== "dark" && mode !== "system") mode = "system";
          var system = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          var theme = mode === "system" ? system : mode;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", theme === "light" ? "#fffaf2" : "#0c0a09");
          var colorScheme = document.querySelector('meta[name="color-scheme"]');
          if (colorScheme) colorScheme.setAttribute("content", theme);
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=taostudio-peach-raster-20260522" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=taostudio-peach-raster-20260522" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=taostudio-peach-raster-20260522" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=taostudio-peach-raster-20260522" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.github.com" crossorigin />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <style>
      html, body, #admin-root { height: 100%; }
      html { background: #0a0807; }
      html[data-theme="light"] { background: #fffaf2; }
      body {
        margin: 0;
        background:
          radial-gradient(ellipse 60% 45% at 8% -6%, rgba(217, 119, 87, 0.16), transparent 60%),
          radial-gradient(ellipse 50% 40% at 96% 10%, rgba(217, 119, 87, 0.07), transparent 60%),
          linear-gradient(180deg, #0a0807 0%, #0c0a09 60%, #0e0b0a 100%);
        color: #ece8e1;
        font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      html[data-theme="light"] body {
        background:
          radial-gradient(ellipse 60% 45% at 8% -6%, rgba(217, 119, 87, 0.13), transparent 60%),
          radial-gradient(ellipse 50% 40% at 96% 10%, rgba(217, 119, 87, 0.08), transparent 60%),
          linear-gradient(180deg, #fffaf2 0%, #f8efe3 60%, #fff7ee 100%);
        color: #211b16;
      }
      .boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; gap: 14px;
        color: #ece8e1;
        font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
      }
      .boot::after {
        content: ""; width: 32px; height: 32px; margin-left: 12px;
        border-radius: 50%;
        border: 2px solid rgba(217,119,87,0.18);
        border-top-color: #d97757;
        animation: bspin 1s linear infinite;
      }
      .boot img { width: 42px; height: 42px; object-fit: contain; }
      html[data-theme="light"] .boot { color: #211b16; }
      @keyframes bspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="admin-root">
      <div class="boot">
        <img
          src="/brand/taostudio-peach-logo-128.png"
          srcset="/brand/taostudio-peach-logo-64.png 64w, /brand/taostudio-peach-logo-128.png 128w, /brand/taostudio-peach-logo-256.png 256w"
          sizes="42px"
          width="128"
          height="128"
          alt=""
          decoding="async"
        />
        <span>桃子AI视觉实验室管理后台</span>
      </div>
    </div>
    <script type="module" src="/src/admin/main.tsx"></script>
  </body>
</html>
