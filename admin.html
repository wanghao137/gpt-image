<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a09" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="referrer" content="no-referrer" />

    <title>Admin · GPT-Image 2 Gallery</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.github.com" crossorigin />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <style>
      html, body, #admin-root { height: 100%; }
      html { background: #0a0807; }
      body {
        margin: 0;
        background:
          radial-gradient(ellipse 60% 45% at 8% -6%, rgba(217, 119, 87, 0.16), transparent 60%),
          radial-gradient(ellipse 50% 40% at 96% 10%, rgba(217, 119, 87, 0.07), transparent 60%),
          linear-gradient(180deg, #0a0807 0%, #0c0a09 60%, #0e0b0a 100%);
        color: #ece8e1;
        font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      .boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        color: #d97757;
        font-family: "Instrument Serif", Palatino, Georgia, serif;
        font-size: 22px; letter-spacing: -0.012em;
      }
      .boot::after {
        content: ""; width: 32px; height: 32px; margin-left: 12px;
        border-radius: 50%;
        border: 2px solid rgba(217,119,87,0.18);
        border-top-color: #d97757;
        animation: bspin 1s linear infinite;
      }
      @keyframes bspin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="admin-root">
      <div class="boot">Admin</div>
    </div>
    <script type="module" src="/src/admin/main.tsx"></script>
  </body>
</html>
